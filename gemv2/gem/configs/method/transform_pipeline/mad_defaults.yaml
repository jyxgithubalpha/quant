# MAD Transform Pipeline - Robust preprocessing using Median/MAD
# Reference: prepare_data function from model_XGBoost.py
_target_: gem.transforms.TransformPipeline
transforms:
  # 1. Filter out date groups with too few samples
  - _target_: gem.transforms.MinSampleFilter
    min_samples: 5

  # 2. Fill NaN with per-date median
  - _target_: gem.transforms.FillNaN
    method: median
    per_date: true
    target: X
    value: 0.0

  # 3. MAD standardize features (per-date, robust to outliers)
  - _target_: gem.transforms.MADStandardize
    target: X
    eps: 1e-6
    per_date: true

  # 4. Standardize labels (per-date, mean/std)
  - _target_: gem.transforms.ZScoreStandardize
    target: y
    eps: 1e-6
    per_date: true
